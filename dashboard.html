<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комплексная аналитика</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f5f6f8; --white: #fff; --border: #e2e5eb; --text: #1a1a1a; --text2: #6b7280; --primary: #2563eb; --danger: #dc2626; --warning: #d97706; --success: #059669; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }
        .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 15px; font-weight: 600; }
        .main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }
        .card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 20px; }
        .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .card-body { padding: 16px; }
        .grid { display: grid; gap: 20px; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
        .grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
        .grid-5 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr; }
        .grid-6 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr; }
        .kpi { text-align: center; padding: 16px; background: #f8fafc; border-radius: 8px; }
        .kpi-value { font-size: 28px; font-weight: 800; }
        .kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-top: 4px; }
        .text-green { color: var(--success); } .text-red { color: var(--danger); } .text-warning { color: var(--warning); }
        .btn-tab { padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; background: var(--white); }
        .btn-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .chart-wrap { position: relative; height: 350px; }
        .chart-wrap-small { position: relative; height: 280px; }
        .chart-wrap canvas, .chart-wrap-small canvas { width: 100% !important; height: 100% !important; }
        .bar { height: 8px; border-radius: 4px; background: #e5e7eb; margin-top: 4px; }
        .bar-fill { height: 100%; border-radius: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .badge-green { background: #ecfdf5; color: var(--success); }
        .badge-red { background: #fef2f2; color: var(--danger); }
        .badge-yellow { background: #fffbeb; color: var(--warning); }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 6px 8px; font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; border-bottom: 2px solid var(--border); cursor: pointer; }
        td { padding: 6px 8px; border-bottom: 1px solid #f0f1f3; }
        tr:hover td { background: #fafbfc; }
        .empty { text-align: center; padding: 40px; color: var(--text2); }
    </style>
</head>
<body x-data="app()" x-init="init()">
    
    <header class="header">
        <span class="header-title">Комплексная аналитика</span>
        <span style="font-size: 11px; color: var(--text2);">Данные по август 2023</span>
    </header>
    
    <main class="main" x-show="!loading">
        
        <!-- KPI -->
        <div class="grid grid-6" style="margin-bottom: 20px;">
            <div class="kpi"><div class="kpi-value" x-text="kpi.totalClients"></div><div class="kpi-label">Всего клиентов</div></div>
            <div class="kpi"><div class="kpi-value" x-text="kpi.activeClients"></div><div class="kpi-label">Активных (авг 2023)</div></div>
            <div class="kpi"><div class="kpi-value" x-text="fmtMoney(kpi.totalRevenue)"></div><div class="kpi-label">Общая выручка</div></div>
            <div class="kpi"><div class="kpi-value" x-text="fmtMoney(kpi.avgCheck)"></div><div class="kpi-label">Средний чек</div></div>
            <div class="kpi"><div class="kpi-value text-red" x-text="kpi.riskClients"></div><div class="kpi-label">В зоне риска</div></div>
            <div class="kpi"><div class="kpi-value text-red" x-text="fmtMoney(kpi.potentialLoss)"></div><div class="kpi-label">Под риском</div></div>
        </div>
        
        <div class="grid grid-2">
            <!-- ДИНАМИКА ВЫРУЧКИ -->
            <div class="card">
                <div class="card-header">
                    Динамика выручки
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-tab" :class="revFilter === 'all' ? 'active' : ''" @click="revFilter = 'all'; drawRevenueChart()">Все</button>
                        <button class="btn-tab" :class="revFilter === 'new' ? 'active' : ''" @click="revFilter = 'new'; drawRevenueChart()">Новые</button>
                        <button class="btn-tab" :class="revFilter === 'regular' ? 'active' : ''" @click="revFilter = 'regular'; drawRevenueChart()">Постоянные</button>
                    </div>
                </div>
                <div class="card-body"><div class="chart-wrap"><canvas id="revenueChart"></canvas></div></div>
            </div>
            
            <!-- СЕГМЕНТЫ -->
            <div class="card">
                <div class="card-header">Клиенты по сегментам</div>
                <div class="card-body">
                    <div class="chart-wrap-small"><canvas id="segmentChart"></canvas></div>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;">
                        <template x-for="s in segments" :key="s.name">
                            <button class="btn-tab" :class="segFilter === s.name ? 'active' : ''" @click="segFilter = s.name; filterTable()" x-text="s.name + ' (' + s.count + ')'"></button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="grid grid-2">
            <!-- ТОП-10 -->
            <div class="card">
                <div class="card-header">
                    Топ-10 клиентов
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-tab" :class="topFilter === 'revenue' ? 'active' : ''" @click="topFilter = 'revenue'; drawTopChart()">По выручке</button>
                        <button class="btn-tab" :class="topFilter === 'risk' ? 'active' : ''" @click="topFilter = 'risk'; drawTopChart()">По риску</button>
                    </div>
                </div>
                <div class="card-body"><div class="chart-wrap-small"><canvas id="topChart"></canvas></div></div>
            </div>
            
            <!-- МАРШРУТЫ -->
            <div class="card">
                <div class="card-header">
                    Популярные маршруты
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-tab" :class="routeFilter === 'count' ? 'active' : ''" @click="routeFilter = 'count'; drawRouteChart()">По количеству</button>
                        <button class="btn-tab" :class="routeFilter === 'sum' ? 'active' : ''" @click="routeFilter = 'sum'; drawRouteChart()">По сумме</button>
                    </div>
                </div>
                <div class="card-body"><div class="chart-wrap-small"><canvas id="routeChart"></canvas></div></div>
            </div>
        </div>
        
        <!-- КЛИЕНТЫ В ЗОНЕ РИСКА -->
        <div class="card">
            <div class="card-header">
                Клиенты, требующие внимания
                <div style="display: flex; gap: 4px;">
                    <button class="btn-tab" :class="riskTableFilter === 'all' ? 'active' : ''" @click="riskTableFilter = 'all'">Все</button>
                    <button class="btn-tab" :class="riskTableFilter === 'critical' ? 'active' : ''" @click="riskTableFilter = 'critical'">Критические</button>
                    <button class="btn-tab" :class="riskTableFilter === 'overdue' ? 'active' : ''" @click="riskTableFilter = 'overdue'">Просрочка</button>
                </div>
            </div>
            <div class="card-body" style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Клиент</th><th>Менеджер</th><th>Риск</th><th>Сигналы</th><th>Под риском</th><th>Действие</th></tr></thead>
                    <tbody>
                        <template x-for="c in filteredRiskTable()" :key="c.id">
                            <tr>
                                <td x-text="c.name"></td><td x-text="c.manager"></td>
                                <td><span :class="c.level === 'КРИТИЧЕСКИЙ' ? 'text-red' : 'text-warning'" x-text="c.level"></span></td>
                                <td x-text="c.signals.join(', ')"></td>
                                <td class="text-red" x-text="fmtMoney(c.loss)"></td>
                                <td x-text="c.action"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <div class="empty" x-show="loading">Загрузка данных...</div>
    
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYdsFbC9TGXvjdfTQ7tI7TD_ixYJNfM9bNJJCF6xjwoSqE5oRLGaxLjv7EYeT6eGDyQA/exec';
        
        function fmtMoney(val) {
            if (!val) return '—';
            const num = Number(val);
            if (Math.abs(num) >= 1e6) return (num/1e6).toFixed(1) + ' млн ₽';
            if (Math.abs(num) >= 1e3) return (num/1e3).toFixed(0) + ' тыс ₽';
            return num.toLocaleString('ru-RU') + ' ₽';
        }
        
        function app() {
            return {
                loading: true, allData: [], clients: [], kpi: {}, segments: [],
                revFilter: 'all', segFilter: '', topFilter: 'revenue', routeFilter: 'count', riskTableFilter: 'all',
                chartRev: null, chartSeg: null, chartTop: null, chartRoute: null,
                
                async init() {
                    try {
                        const r = await fetch(SCRIPT_URL);
                        this.allData = await r.json();
                        this.buildAll();
                    } catch(e) { console.error(e); }
                    this.loading = false;
                },
                
                buildAll() {
                    // Группировка по contact_id
                    const map = {};
                    this.allData.forEach(o => {
                        const id = String(o.contact_id || '0');
                        if (!map[id]) map[id] = [];
                        map[id].push(o);
                    });
                    
                    this.clients = Object.entries(map).map(([id, orders]) => {
                        orders.sort((a,b) => new Date(a.date) - new Date(b.date));
                        const last = orders[orders.length - 1];
                        const amounts = orders.map(o => Number(o.amount) || 0);
                        const total = amounts.reduce((a,b) => a+b, 0);
                        const count = orders.length;
                        const lastDate = new Date(last.date);
                        const firstDate = new Date(orders[0].date);
                        const daysActive = Math.max(1, (lastDate - firstDate) / 86400000);
                        const monthsActive = Math.max(1, Math.round(daysActive / 30));
                        const ordersPerMonth = count / monthsActive;
                        const now = new Date(lastDate);
                        const threeMonthsAgo = new Date(now.getFullYear(), now.getMonth()-3, 1);
                        const recent = orders.filter(o => new Date(o.date) >= threeMonthsAgo);
                        const recentSum = recent.reduce((a,b) => a + (Number(b.amount)||0), 0);
                        const avgCheck = total / count;
                        const unpaid = orders.filter(o => o.payment_status !== 'оплачено');
                        const debt = unpaid.reduce((a,b) => a + (Number(b.amount)||0), 0);
                        const last12m = orders.filter(o => new Date(o.date) >= new Date(now.getFullYear()-1, now.getMonth(), 1));
                        const last12mSum = last12m.reduce((a,b) => a + (Number(b.amount)||0), 0);
                        const dso = last12mSum ? Math.round((debt / last12mSum) * 365) : 0;
                        const overdue = orders.filter(o => o.payment_status !== 'оплачено' && (now - new Date(o.date)) / 86400000 > 30);
                        const overduePct = Math.round(overdue.length / count * 100);
                        const daysSinceLast = Math.round((new Date() - lastDate) / 86400000);
                        const normalInterval = count > 1 ? Math.round(daysActive / (count - 1)) : 30;
                        const missedIntervals = Math.round(daysSinceLast / normalInterval);
                        const paidPct = Math.round((count - unpaid.length) / count * 100);
                        
                        // RFM
                        const rfm_R = daysSinceLast <= 7 ? 5 : daysSinceLast <= 14 ? 4 : daysSinceLast <= 30 ? 3 : daysSinceLast <= 60 ? 2 : 1;
                        const rfm_F = ordersPerMonth >= 10 ? 5 : ordersPerMonth >= 5 ? 4 : ordersPerMonth >= 2 ? 3 : ordersPerMonth >= 1 ? 2 : 1;
                        const maxCheck = Math.max(...amounts);
                        const rfm_M = avgCheck >= maxCheck*0.8 ? 5 : avgCheck >= maxCheck*0.5 ? 4 : avgCheck >= maxCheck*0.3 ? 3 : avgCheck >= maxCheck*0.1 ? 2 : 1;
                        const rfm_P = paidPct >= 95 ? 5 : paidPct >= 80 ? 4 : paidPct >= 60 ? 3 : paidPct >= 30 ? 2 : 1;
                        const segScore = rfm_R + rfm_F + rfm_M + rfm_P;
                        const segment = segScore >= 18 ? 'VIP' : segScore >= 14 ? 'Лояльный' : segScore >= 10 ? 'Средний' : segScore >= 6 ? 'Редкий' : 'Уходит';
                        
                        // Сигналы
                        const signals = [];
                        let level = 'НОРМА';
                        if (missedIntervals >= 2) { signals.push('Пропал'); level = 'КРИТИЧЕСКИЙ'; }
                        if (dso > 30) { signals.push('DSO>30'); if (level !== 'КРИТИЧЕСКИЙ') level = 'СРЕДНИЙ'; }
                        if (overduePct > 10) { signals.push('Просрочка'); if (level !== 'КРИТИЧЕСКИЙ') level = 'СРЕДНИЙ'; }
                        const loss = debt + overdue.reduce((a,b) => a + (Number(b.amount)||0), 0);
                        const action = level === 'КРИТИЧЕСКИЙ' ? 'Срочный звонок' : level === 'СРЕДНИЙ' ? 'Контроль оплаты' : '—';
                        const isActive = new Date(last.date).getFullYear() === 2023 && new Date(last.date).getMonth() === 7;
                        
                        return { id, name: last.organization || 'Клиент ' + id, manager: last.manager || '—', total, count, avgCheck, segment, level, signals, loss, action, isActive, orders, recentSum, client_type: last.client_type };
                    });
                    
                    // KPI
                    const activeClients = this.clients.filter(c => c.isActive);
                    this.kpi = {
                        totalClients: this.clients.length,
                        activeClients: activeClients.length,
                        totalRevenue: this.clients.reduce((a,b) => a + b.total, 0),
                        avgCheck: Math.round(this.clients.reduce((a,b) => a + b.total, 0) / this.clients.length),
                        riskClients: this.clients.filter(c => c.level !== 'НОРМА').length,
                        potentialLoss: this.clients.filter(c => c.level !== 'НОРМА').reduce((a,b) => a + b.loss, 0)
                    };
                    
                    // Сегменты
                    const segMap = {};
                    this.clients.forEach(c => { segMap[c.segment] = (segMap[c.segment] || 0) + 1; });
                    this.segments = Object.entries(segMap).map(([name, count]) => ({ name, count }));
                    
                    this.$nextTick(() => { this.drawRevenueChart(); this.drawSegmentChart(); this.drawTopChart(); this.drawRouteChart(); });
                },
                
                drawRevenueChart() {
                    const canvas = document.getElementById('revenueChart'); if (!canvas) return;
                    if (this.chartRev) this.chartRev.destroy();
                    const monthly = {};
                    const filtered = this.revFilter === 'new' ? this.clients.filter(c => c.client_type?.includes('Новый')) : this.revFilter === 'regular' ? this.clients.filter(c => c.client_type === 'Постоянный') : this.clients;
                    filtered.forEach(c => c.orders.forEach(o => { const d = new Date(o.date); const k = d.toLocaleString('ru-RU', { month: 'short', year: 'numeric' }); monthly[k] = (monthly[k] || 0) + (Number(o.amount) || 0); }));
                    const data = Object.entries(monthly).map(([m, s]) => ({ month: m, sum: s }));
                    this.chartRev = new Chart(canvas.getContext('2d'), { type: 'bar', data: { labels: data.map(d => d.month), datasets: [{ data: data.map(d => d.sum), backgroundColor: '#2563eb', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => v/1e6 + 'M' } } } } });
                },
                
                drawSegmentChart() {
                    const canvas = document.getElementById('segmentChart'); if (!canvas) return;
                    if (this.chartSeg) this.chartSeg.destroy();
                    this.chartSeg = new Chart(canvas.getContext('2d'), { type: 'doughnut', data: { labels: this.segments.map(s => s.name), datasets: [{ data: this.segments.map(s => s.count), backgroundColor: ['#2563eb', '#059669', '#d97706', '#dc2626', '#6b7280'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
                },
                
                drawTopChart() {
                    const canvas = document.getElementById('topChart'); if (!canvas) return;
                    if (this.chartTop) this.chartTop.destroy();
                    const sorted = this.topFilter === 'revenue' ? [...this.clients].sort((a,b) => b.total - a.total).slice(0,10) : [...this.clients].filter(c => c.level !== 'НОРМА').sort((a,b) => b.loss - a.loss).slice(0,10);
                    this.chartTop = new Chart(canvas.getContext('2d'), { type: 'bar', indexAxis: 'y', data: { labels: sorted.map(c => c.name.substring(0,30)), datasets: [{ data: sorted.map(c => this.topFilter === 'revenue' ? c.total : c.loss), backgroundColor: this.topFilter === 'revenue' ? '#2563eb' : '#dc2626', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { callback: v => v/1e6 + 'M' } } } } });
                },
                
                drawRouteChart() {
                    const canvas = document.getElementById('routeChart'); if (!canvas) return;
                    if (this.chartRoute) this.chartRoute.destroy();
                    const routes = {};
                    this.allData.forEach(o => { const r = o.route || 'Не указан'; routes[r] = (routes[r] || 0) + (this.routeFilter === 'sum' ? (Number(o.amount)||0) : 1); });
                    const sorted = Object.entries(routes).sort((a,b) => b[1] - a[1]).slice(0,10);
                    this.chartRoute = new Chart(canvas.getContext('2d'), { type: 'bar', indexAxis: 'y', data: { labels: sorted.map(([n]) => n.substring(0,30)), datasets: [{ data: sorted.map(([,v]) => v), backgroundColor: '#2563eb', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
                },
                
                filteredRiskTable() {
                    let list = this.clients.filter(c => c.level !== 'НОРМА');
                    if (this.riskTableFilter === 'critical') list = list.filter(c => c.level === 'КРИТИЧЕСКИЙ');
                    if (this.riskTableFilter === 'overdue') list = list.filter(c => c.signals.includes('Просрочка'));
                    if (this.segFilter) list = list.filter(c => c.segment === this.segFilter);
                    return list;
                },
                
                filterTable() { /* already reactive */ },
                
                fmtMoney(val) { return fmtMoney(val); }
            }
        }
    </script>
</body>
</html>
